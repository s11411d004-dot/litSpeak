# Server
server.port=${PORT:8080}

# Azure Speech (TTS + Assessment shared key)
azure.speech.key=${AZURE_SPEECH_KEY:}
azure.region=${AZURE_REGION:eastasia}

# Azure Translator
azure.translator.key=${AZURE_TRANSLATOR_KEY:}
azure.translator.region=${AZURE_TRANSLATOR_REGION:eastasia}

# Supabase
supabase.url=${SUPABASE_URL:}
supabase.service.key=${SUPABASE_SERVICE_KEY:}

# Quota
quota.tts.monthly=${TTS_MONTHLY_LIMIT:500000}
quota.translate.monthly=${TRANSLATE_MONTHLY_LIMIT:500000}
quota.assessment.monthly=${ASSESSMENT_MONTHLY_LIMIT:10000}

# Spring
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.main.banner-mode=off
spring.jackson.property-naming-strategy=SNAKE_CASE

# Multipart (for assessment audio upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
